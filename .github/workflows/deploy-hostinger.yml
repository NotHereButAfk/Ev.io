name: Deploy to Hostinger

# Auto-build the Vite site and upload dist/ to Hostinger over FTP on every push
# to main. Set these repo secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER    e.g. ftp.yourdomain.com  (from hPanel → Files → FTP Accounts)
#   FTP_USERNAME  the FTP account username
#   FTP_PASSWORD  the FTP account password
# And set the server-dir below to your site's web root (often /public_html/).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # Optional: URL of the shared 24/7 match-state relay (see server/README.md).
          # Add a repo secret named VITE_WS_URL once that server is deployed;
          # left unset, the game falls back to its local-only simulation.
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      # Hostinger's FTPS control socket occasionally times out from GitHub's
      # runners, so retry the upload a few times before giving up.
      - name: Upload dist/ to Hostinger via FTPS (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: 120000

      - name: Wait before retry
        if: steps.ftp1.outcome == 'failure'
        run: sleep 25

      - name: Upload dist/ to Hostinger via FTPS (attempt 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: 120000

      - name: Wait before final retry
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 40

      - name: Upload dist/ to Hostinger via FTPS (attempt 3)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: 120000
