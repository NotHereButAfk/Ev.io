name: Deploy to Hostinger

# Auto-build the Vite site and upload dist/ to Hostinger over FTP on every push
# to main. Set these repo secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER    e.g. ftp.yourdomain.com  (from hPanel → Files → FTP Accounts)
#   FTP_USERNAME  the FTP account username
#   FTP_PASSWORD  the FTP account password
# And set the server-dir below to your site's web root (often /public_html/).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload dist/ to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
          timeout: 60000
